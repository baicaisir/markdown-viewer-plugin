name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build & test
        run: mvn -B -ntp verify
      - name: Upload HPI
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-viewer-hpi
          path: target/*.hpi
